version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    groups:
      nestjs:
        patterns: ["@nestjs/*"]
      prisma:
        patterns: ["@prisma/*", "prisma"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: swift
    directory: /ios
    schedule:
      interval: weekly

  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
