name: AppStarterKit
options:
  bundleIdPrefix: com.appstarterkit.app
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
configs:
  Dev-Debug: debug
  Dev-Release: release
  Staging-Debug: debug
  Staging-Release: release
  Release-Debug: debug
  Release-Release: release
targets:
  AppStarterKit:
    type: application
    platform: iOS
    sources:
      - path: AppStarterKit
    configFiles:
      Dev-Debug: Configs/Dev.xcconfig
      Dev-Release: Configs/Dev.xcconfig
      Staging-Debug: Configs/Staging.xcconfig
      Staging-Release: Configs/Staging.xcconfig
      Release-Debug: Configs/Release.xcconfig
      Release-Release: Configs/Release.xcconfig
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_NAME: AppStarterKit
        INFOPLIST_FILE: AppStarterKit/App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
    dependencies: []
  AppStarterKitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AppStarterKitTests
    resources:
      - path: AppStarterKitTests/Fixtures
    dependencies:
      - target: AppStarterKit
    settings:
      base:
        SWIFT_VERSION: "5.9"
  AppStarterKitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AppStarterKitUITests
    dependencies:
      - target: AppStarterKit
    settings:
      base:
        SWIFT_VERSION: "5.9"
schemes:
  AppStarterKit-Dev:
    build:
      targets:
        AppStarterKit: all
    run:
      config: Dev-Debug
    test:
      config: Dev-Debug
      targets:
        - AppStarterKitTests
        - AppStarterKitUITests
  AppStarterKit-Staging:
    build:
      targets:
        AppStarterKit: all
    run:
      config: Staging-Debug
  AppStarterKit-Release:
    build:
      targets:
        AppStarterKit: all
    run:
      config: Release-Release
